# Unified DocumentDB E2E test workflow.
#
# Replaces the legacy test-E2E.yml / test-integration.yml /
# test-backup-and-restore.yml / test-upgrade-and-rollback.yml quartet.
# See docs/designs/e2e-test-suite.md ("CI Workflow" section) for the
# design rationale.
#
# Each matrix job runs a single Ginkgo label-filtered slice of the suite
# under test/e2e/. The composite action .github/actions/setup-test-environment
# provisions a Kind cluster, installs cert-manager + the operator, and
# deploys any scenario-specific prerequisites.

name: TEST - E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'test/e2e/**'
      - 'operator/src/**'
      - 'operator/documentdb-helm-chart/**'
      - '.github/workflows/test-e2e.yml'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      label:
        description: 'Ginkgo --label-filter override (empty = use per-job default)'
        required: false
        type: string
        default: ''
      depth:
        description: 'Test depth tier (mapped to TEST_DEPTH; accepts Low|Medium|High)'
        required: false
        type: choice
        options:
          - Low
          - Medium
          - High
        default: Medium
      keep_clusters:
        description: 'Keep Kind clusters running after tests (for debugging)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  packages: read

env:
  # Namespaces / identity used by the composite setup action. Held here
  # so every job inherits them without duplication.
  CERT_MANAGER_NS: cert-manager
  OPERATOR_NS: documentdb-operator
  DB_NS: documentdb-e2e
  DB_NAME: documentdb-e2e
  DB_USERNAME: k8s_secret_user
  DB_PASSWORD: K8sSecret100
  DB_PORT: 10260

jobs:
  # ---------------------------------------------------------------------------
  # Build operator + gateway images and the helm chart once per workflow run.
  # Each E2E job below downloads the resulting artifacts into ./artifacts so
  # setup-test-environment can load them into its Kind cluster.
  # ---------------------------------------------------------------------------
  build:
    name: Build Images and Charts
    uses: ./.github/workflows/test-build-and-package.yml
    with:
      version: '0.2.0'
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Compute the E2E matrix as a single `include` array. We do this in a
  # dedicated job because:
  #
  #   1. GitHub Actions does NOT expand `matrix.*` inside a job-level
  #      `if:` expression — that's a parser-level error, not a runtime
  #      one — so we cannot gate the `performance` rows directly on the
  #      job's `if:`.
  #   2. The static `matrix:` syntax does not accept expressions in its
  #      list values, so we cannot conditionally drop rows there either.
  #
  # Emitting the full include[] from a setup job + consuming it via
  # `fromJSON` is the idiomatic workaround. `performance` is included
  # only on workflow_dispatch / schedule / PRs labeled `run-perf`.
  # ---------------------------------------------------------------------------
  compute-matrix:
    name: Compute E2E Matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_RUN_PERF_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-perf') }}
        run: |
          set -euo pipefail
          # paths: space-separated Ginkgo package paths to scan. Scoped
          # per group so a backup row only compiles + spawns tests/backup,
          # not the whole tests/* tree (the previous "ginkgo run -r
          # ./tests/..." discovered all 10 spec packages every row and
          # then label-filtered ~52 of 60 specs at runtime — wasteful
          # compile/process startup × 16 matrix rows). The smoke label
          # is currently only on tests/lifecycle/deploy; the feature row
          # is the only multi-package row by design.
          base='[
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"smoke","default_filter":"smoke","procs":"auto","paths":"./tests/lifecycle"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"lifecycle","default_filter":"lifecycle","procs":"auto","paths":"./tests/lifecycle"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"scale","default_filter":"scale","procs":"2","paths":"./tests/scale"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"data","default_filter":"data","procs":"auto","paths":"./tests/data"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"backup","default_filter":"backup","procs":"2","paths":"./tests/backup"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"tls","default_filter":"tls","procs":"auto","paths":"./tests/tls"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"feature","default_filter":"feature-gates || exposure || status","procs":"auto","paths":"./tests/feature_gates ./tests/exposure ./tests/status"},
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"upgrade","default_filter":"upgrade","procs":"1","paths":"./tests/upgrade"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"smoke","default_filter":"smoke","procs":"auto","paths":"./tests/lifecycle"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"lifecycle","default_filter":"lifecycle","procs":"auto","paths":"./tests/lifecycle"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"scale","default_filter":"scale","procs":"2","paths":"./tests/scale"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"data","default_filter":"data","procs":"auto","paths":"./tests/data"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"backup","default_filter":"backup","procs":"2","paths":"./tests/backup"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"tls","default_filter":"tls","procs":"auto","paths":"./tests/tls"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"feature","default_filter":"feature-gates || exposure || status","procs":"auto","paths":"./tests/feature_gates ./tests/exposure ./tests/status"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"upgrade","default_filter":"upgrade","procs":"1","paths":"./tests/upgrade"}
          ]'
          perf='[
            {"architecture":"amd64","runner":"ubuntu-22.04","group":"performance","default_filter":"performance","procs":"1","paths":"./tests/performance"},
            {"architecture":"arm64","runner":"ubuntu-22.04-arm","group":"performance","default_filter":"performance","procs":"1","paths":"./tests/performance"}
          ]'
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "schedule" || "$HAS_RUN_PERF_LABEL" == "true" ]]; then
            include="$(jq -c '. + $p' --argjson p "$perf" <<<"$base")"
          else
            include="$(jq -c '.' <<<"$base")"
          fi
          echo "include=$include" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # E2E matrix.
  #
  # Rows = (label-group, architecture). The label-group carries the
  # Ginkgo --label-filter, Ginkgo --procs setting, and a human-readable
  # scenario name used for artifact naming and kind cluster isolation.
  #
  # arm64 rows target `ubuntu-22.04-arm` — the same GitHub-hosted runner
  # the legacy workflows use. If that SKU becomes unavailable in the
  # future, the arm64 rows can be removed or gated on a feature flag;
  # do not silently drop them.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E ${{ matrix.group }} (${{ matrix.architecture }})
    needs: [build, compute-matrix]
    if: always() && needs.build.result == 'success' && needs.compute-matrix.result == 'success'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      # fail-fast: any matrix row failing cancels all in-flight rows.
      # Saves runner-minutes on broken PRs at the cost of visibility into
      # whether other suites would also have failed. Use "rerun failed
      # jobs" after a fix to revalidate just the cancelled slices.
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.include) }}
    env:
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      TEST_DEPTH: ${{ inputs.depth || 'Medium' }}
      GINKGO_LABEL_FILTER: ${{ inputs.label != '' && inputs.label || matrix.default_filter }}
      E2E_KEEP_CLUSTERS: ${{ inputs.keep_clusters && '1' || '0' }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      # documentdb / gateway images live on the database/extension version
      # track (documentDbVersion in values.yaml), distinct from the operator
      # image-tag. The build workflow surfaces it as ext_image_tag and we
      # forward it to setup-test-environment as documentdb-image-tag so
      # `kind load` resolves the correct ghcr.io tag.
      EXT_IMAGE_TAG: ${{ needs.build.outputs.ext_image_tag }}
      CHART_VERSION: ${{ needs.build.outputs.chart_version || '0.1.0' }}
      # Upgrade job knobs. Defaults point at the public OCI chart;
      # repository admins may override via `vars`/`secrets` for private
      # scenarios. If any of the *_IMAGE values are left unset the
      # upgrade specs Skip at runtime (see test/e2e/tests/upgrade/).
      E2E_UPGRADE: ${{ matrix.group == 'upgrade' && '1' || '' }}
      E2E_UPGRADE_PREVIOUS_CHART: ${{ vars.E2E_UPGRADE_PREVIOUS_CHART || 'oci://ghcr.io/documentdb/charts/documentdb-operator' }}
      E2E_UPGRADE_PREVIOUS_VERSION: ${{ vars.E2E_UPGRADE_PREVIOUS_VERSION || '' }}
      E2E_UPGRADE_CURRENT_CHART: ${{ vars.E2E_UPGRADE_CURRENT_CHART || '' }}
      E2E_UPGRADE_OLD_DOCUMENTDB_IMAGE: ${{ vars.E2E_UPGRADE_OLD_DOCUMENTDB_IMAGE || '' }}
      E2E_UPGRADE_NEW_DOCUMENTDB_IMAGE: ${{ vars.E2E_UPGRADE_NEW_DOCUMENTDB_IMAGE || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: test/e2e/go.mod
          cache-dependency-path: test/e2e/go.sum

      # Only fetch the artifacts the setup-test-environment composite
      # actually consumes: the consolidated platform-specific image
      # tarball (loaded into the kind cluster) and the per-arch helm
      # chart. The other build-* artifacts (per-image tars, deb/rpm
      # packages, gateway runtime files) are only used upstream by
      # consolidate-images and would add ~4 GB of unused download per
      # matrix row.
      - name: Download platform images artifact
        uses: actions/download-artifact@v4
        with:
          name: build-platform-images
          path: ./artifacts/build-platform-images

      - name: Download helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: build-helm-chart-${{ matrix.architecture }}
          path: ./artifacts/build-helm-chart-${{ matrix.architecture }}

      - name: Log test configuration
        run: |
          {
            echo "## E2E — ${{ matrix.group }} (${{ matrix.architecture }})"
            echo ""
            echo "- **Label filter**: \`${GINKGO_LABEL_FILTER}\`"
            echo "- **Procs**: \`${{ matrix.procs }}\`"
            echo "- **Depth**: \`${TEST_DEPTH}\`"
            echo "- **Run ID**: \`${E2E_RUN_ID}\`"
            echo "- **Image tag**: \`${IMAGE_TAG}\`"
            echo "- **Extension image tag**: \`${EXT_IMAGE_TAG}\`"
            echo "- **Chart version**: \`${CHART_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup test environment
        uses: ./.github/actions/setup-test-environment
        with:
          test-type: 'e2e'
          architecture: ${{ matrix.architecture }}
          runner: ${{ matrix.runner }}
          test-scenario-name: ${{ matrix.group }}
          node-count: '1'
          instances-per-node: '1'
          cert-manager-namespace: ${{ env.CERT_MANAGER_NS }}
          operator-namespace: ${{ env.OPERATOR_NS }}
          db-namespace: ${{ env.DB_NS }}
          db-cluster-name: ${{ env.DB_NAME }}
          db-username: ${{ env.DB_USERNAME }}
          db-password: ${{ env.DB_PASSWORD }}
          db-port: ${{ env.DB_PORT }}
          image-tag: ${{ env.IMAGE_TAG }}
          documentdb-image-tag: ${{ env.EXT_IMAGE_TAG }}
          chart-version: ${{ env.CHART_VERSION }}
          use-external-images: 'false'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository-owner: ${{ github.repository_owner }}

      - name: Install Ginkgo CLI
        working-directory: test/e2e
        run: |
          # Pin the ginkgo CLI to the version declared in test/e2e/go.mod
          # so the binary's flag handling and bundled runtime match the
          # version the specs were compiled against. An unpinned
          # `go install ...@latest` would silently pick up newer
          # ginkgo versions and re-introduce flag-parse / behavior
          # drift between local and CI runs.
          GINKGO_VERSION="$(go list -m -f '{{.Version}}' github.com/onsi/ginkgo/v2)"
          echo "Installing ginkgo CLI ${GINKGO_VERSION}"
          go install "github.com/onsi/ginkgo/v2/ginkgo@${GINKGO_VERSION}"
          ginkgo version

      - name: Run E2E specs
        working-directory: test/e2e
        run: |
          mkdir -p artifacts
          set -o pipefail
          # The setup-test-environment composite action loads
          # platform-specific images (`<repo>:<tag>-${arch}`) into the
          # kind cluster and exports DOCUMENTDB_IMAGE_RESOLVED /
          # GATEWAY_IMAGE_RESOLVED with that platform-specific tag.
          # Spec helpers (test/e2e/pkg/e2eutils/fixtures, tests/*/helpers_test.go)
          # render CRs by reading $DOCUMENTDB_IMAGE / $GATEWAY_IMAGE,
          # falling back to the operator chart's documentDbVersion
          # default when those are empty — which omits the -${arch}
          # suffix and resolves to an image that was never `kind load`ed,
          # producing an ImagePullBackOff loop and a 600s spec timeout.
          # Forward the resolved (suffixed) refs so every spec deploys a
          # CR pointing at an image that's actually present in kind.
          export DOCUMENTDB_IMAGE="${DOCUMENTDB_IMAGE_RESOLVED}"
          export GATEWAY_IMAGE="${GATEWAY_IMAGE_RESOLVED}"
          # ginkgo `--procs` is integer-only. The matrix encodes "auto"
          # for groups that benefit from CPU-count parallelism; translate
          # it to `-p` (ginkgo's documented auto-detect flag), and pass an
          # explicit `--procs=N` only when the matrix pinned a fixed N.
          PROCS_FLAG="--procs=${{ matrix.procs }}"
          if [ "${{ matrix.procs }}" = "auto" ]; then
            PROCS_FLAG="-p"
          fi
          # No -r: each matrix row already specifies the exact package
          # paths it cares about (matrix.paths). Recursing from
          # ./tests/... discovered all 10 spec packages and then
          # label-filtered ~87% of them at runtime — that bought us
          # nothing except 9 extra compiled binaries and 9 extra
          # process spawns per row. The matrix is the source of truth
          # for what each row runs.
          ginkgo run \
            --label-filter="${GINKGO_LABEL_FILTER}" \
            ${PROCS_FLAG} \
            --timeout=75m \
            --flake-attempts=2 \
            --keep-going \
            --junit-report=junit.xml \
            --output-dir=artifacts \
            ${{ matrix.paths }} 2>&1 | tee artifacts/ginkgo.log

      - name: Collect cluster diagnostics
        if: failure()
        uses: ./.github/actions/collect-logs
        with:
          architecture: ${{ matrix.architecture }}
          operator-namespace: ${{ env.OPERATOR_NS }}
          db-namespace: ${{ env.DB_NS }}
          db-name: ${{ env.DB_NAME }}

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-${{ matrix.group }}-${{ matrix.architecture }}-${{ github.run_attempt }}
          path: test/e2e/artifacts/junit.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload E2E logs and diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.group }}-${{ matrix.architecture }}-${{ github.run_attempt }}
          path: |
            test/e2e/artifacts/
            /tmp/cluster-logs/
          if-no-files-found: ignore
          retention-days: 14
