apiVersion: batch/v1
kind: Job
metadata:
  name: seed-pending-jobs
  namespace: app
  labels:
    app.kubernetes.io/part-of: keda-documentdb-demo
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: keda-documentdb-demo
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: mongo:8.0
          command:
            - /bin/sh
            - -c
            - |
              mongosh "$MONGODB_URI" --eval '
                db.getSiblingDB("appdb").jobs.insertMany(
                  Array.from({length: 10}, (_, i) => ({
                    status: "pending",
                    created: new Date(),
                    data: "job-" + (i + 1)
                  }))
                );
                print("Pending jobs: " + db.getSiblingDB("appdb").jobs.countDocuments({status: "pending"}));
              '
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: documentdb-keda-connection
                  key: connectionString
